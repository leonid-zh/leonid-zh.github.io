<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Platform / DevOps Engineer portfolio focused on infrastructure automation and high availability.">
  <title>Leonid Zhavoronkov - Platform / DevOps Engineer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>
</head>
<body>
  <nav class="side-nav" aria-label="Primary navigation">
    <a class="brand" href="#about" aria-label="Go to about section">
      <span class="brand-name" id="nav-name">Leonid Zhavoronkov</span>
      <span class="brand-avatar" id="nav-avatar" aria-hidden="true">LZ</span>
    </a>

    <div class="nav-actions" aria-label="Display settings">
      <button id="theme-toggle" class="nav-btn theme-btn" type="button" aria-pressed="false">Dark</button>
      <button id="lang-en" class="nav-btn" type="button" data-lang="en">EN</button>
      <button id="lang-de" class="nav-btn" type="button" data-lang="de">DE</button>
    </div>

    <ul class="nav-links">
      <li><a href="#about" id="nav-about">About</a></li>
      <li><a href="#experience" id="nav-experience">Experience</a></li>
      <li><a href="#education" id="nav-education">Education</a></li>
      <li><a href="#skills" id="nav-skills">Skills</a></li>
      <li><a href="#side-projects" id="nav-side-projects">Side Projects</a></li>
      <li><a href="#languages" id="nav-languages">Languages</a></li>
      <li><a href="#contact" id="nav-contact">Contact</a></li>
    </ul>
  </nav>

  <main class="page">
    <section class="resume-section hero-section" id="about" aria-labelledby="intro-name">
      <div class="section-content">
        <p class="eyebrow" id="intro-role"></p>
        <h1 id="intro-name"></h1>
        <p class="subheading" id="intro-meta"></p>
        <p class="lead" id="intro-summary"></p>
        <ul class="social-icons" id="intro-links">
          <li><a id="contact-linkedin" class="social-icon" href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><span class="icon icon-linkedin" aria-hidden="true"></span><span class="link-text">LinkedIn</span></a></li>
          <li><a id="contact-github" class="social-icon" href="#" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><span class="icon icon-github" aria-hidden="true"></span><span class="link-text">GitHub</span></a></li>
          <li><a id="contact-facebook" class="social-icon" href="#" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><span class="icon icon-facebook" aria-hidden="true"></span><span class="link-text">Facebook</span></a></li>
          <li><a id="contact-email" class="social-icon" href="#"><span class="icon icon-email" aria-hidden="true"></span><span class="link-text"></span></a></li>
          <li><a id="contact-resume" class="social-icon" href="#"><span class="icon icon-download" aria-hidden="true"></span><span class="link-text"></span></a></li>
        </ul>
      </div>
    </section>

    <section class="resume-section" id="experience" aria-labelledby="experience-title">
      <div class="section-content">
        <h2 id="experience-title">Experience Summary</h2>
        <div class="timeline" id="experience-container"></div>
      </div>
    </section>

    <section class="resume-section" id="education" aria-labelledby="education-title">
      <div class="section-content">
        <h2 id="education-title">Education</h2>
        <div class="timeline" id="education-container"></div>
      </div>
    </section>

    <section class="resume-section" id="skills" aria-labelledby="skills-title">
      <div class="section-content">
        <h2 id="skills-title">Skills</h2>
        <ul class="skills-list" id="skills-container"></ul>
      </div>
    </section>

    <section class="resume-section" id="side-projects" aria-labelledby="side-projects-title">
      <div class="section-content">
        <h2 id="side-projects-title">Side Projects</h2>
        <div class="showcase-list" id="side-projects-container"></div>
      </div>
    </section>

    <section class="resume-section" id="languages" aria-labelledby="languages-title">
      <div class="section-content">
        <h2 id="languages-title">Languages</h2>
        <ul class="languages-list" id="languages-container"></ul>
      </div>
    </section>

    <section class="resume-section" id="contact" aria-labelledby="contact-title">
      <div class="section-content">
        <h2 id="contact-title">Contact</h2>
        <p class="contact-note" id="contact-note"></p>
        <ul class="contact-list" id="contact-list"></ul>
      </div>
    </section>

    <footer class="site-footer">
      <p><span id="footer-year"></span> <span id="footer-name"></span> · <span id="footer-location"></span></p>
    </footer>
  </main>
</body>
</html>
